<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
</head>
<body>
  <h1>Our Handbags</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="cart.html">Cart</a>
  </nav>

  <div>
    <h3>Leather Handbag</h3>
    <p>Price: ₹2000</p>
    <button onclick="addToCart('Leather Handbag',2000)">Add to Cart</button>
  </div>

  <div>
    <h3>Designer Handbag</h3>
    <p>Price: ₹3500</p>
    <button onclick="addToCart('Designer Handbag',3500)">Add to Cart</button>
  </div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({name, price});
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(name + ' added to cart');
    }
  </script>
</body>
</html>
